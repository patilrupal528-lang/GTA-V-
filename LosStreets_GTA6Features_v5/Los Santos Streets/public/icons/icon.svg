<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Glow effect -->
  <ellipse cx="256" cy="200" rx="200" ry="160" fill="url(#glow)"/>
  <!-- City skyline silhouette -->
  <g fill="#1e2a3a">
    <rect x="20"  y="320" width="30" height="80"/>
    <rect x="55"  y="290" width="25" height="110"/>
    <rect x="85"  y="260" width="20" height="140"/>
    <rect x="110" y="310" width="28" height="90"/>
    <rect x="143" y="240" width="22" height="160"/>
    <rect x="170" y="280" width="18" height="120"/>
    <rect x="360" y="270" width="22" height="130"/>
    <rect x="387" y="240" width="28" height="160"/>
    <rect x="420" y="290" width="20" height="110"/>
    <rect x="445" y="310" width="25" height="90"/>
    <rect x="475" y="330" width="17" height="70"/>
  </g>
  <!-- City skyline bright -->
  <g fill="#2a3a50">
    <rect x="20"  y="320" width="30" height="2"/>
    <rect x="55"  y="290" width="25" height="2"/>
    <rect x="85"  y="260" width="20" height="2"/>
    <rect x="110" y="310" width="28" height="2"/>
    <rect x="143" y="240" width="22" height="2"/>
    <rect x="360" y="270" width="22" height="2"/>
    <rect x="387" y="240" width="28" height="2"/>
    <rect x="420" y="290" width="20" height="2"/>
  </g>
  <!-- Building windows -->
  <g fill="#ffcc44" opacity="0.6">
    <rect x="90"  y="270" width="4" height="5"/>
    <rect x="96"  y="270" width="4" height="5"/>
    <rect x="90"  y="280" width="4" height="5"/>
    <rect x="148" y="250" width="4" height="5"/>
    <rect x="155" y="250" width="4" height="5"/>
    <rect x="148" y="260" width="4" height="5"/>
    <rect x="393" y="250" width="4" height="5"/>
    <rect x="400" y="250" width="4" height="5"/>
    <rect x="393" y="260" width="4" height="5"/>
  </g>
  <!-- Road / ground -->
  <rect x="0" y="390" width="512" height="122" fill="#0d0d0d"/>
  <rect x="0" y="388" width="512" height="4" fill="#ff6600" opacity="0.6"/>
  <!-- Center road lines -->
  <rect x="230" y="400" width="20" height="8" fill="#ffcc00" opacity="0.7"/>
  <rect x="270" y="400" width="20" height="8" fill="#ffcc00" opacity="0.7"/>
  <rect x="310" y="400" width="20" height="8" fill="#ffcc00" opacity="0.7"/>
  <rect x="180" y="400" width="20" height="8" fill="#ffcc00" opacity="0.7"/>
  <!-- Car silhouette -->
  <g transform="translate(180,360)">
    <rect x="0"  y="18" width="152" height="22" rx="4" fill="#cc4400"/>
    <rect x="20" y="6"  width="90"  height="20" rx="6" fill="#aa3300"/>
    <!-- windows -->
    <rect x="26" y="9"  width="35" height="14" rx="3" fill="#88ccff" opacity="0.7"/>
    <rect x="67" y="9"  width="36" height="14" rx="3" fill="#88ccff" opacity="0.7"/>
    <!-- wheels -->
    <circle cx="28"  cy="40" r="12" fill="#111"/>
    <circle cx="28"  cy="40" r="6"  fill="#444"/>
    <circle cx="124" cy="40" r="12" fill="#111"/>
    <circle cx="124" cy="40" r="6"  fill="#444"/>
    <!-- headlights -->
    <rect x="148" y="22" width="6" height="8" rx="2" fill="#ffffaa"/>
    <rect x="-2"  y="22" width="6" height="8" rx="2" fill="#ff4444"/>
  </g>
  <!-- "LSS" text -->
  <text x="256" y="175" font-family="Arial Black,sans-serif" font-size="100" font-weight="900"
        text-anchor="middle" fill="#ff6600" letter-spacing="-4">LSS</text>
  <text x="256" y="215" font-family="Arial,sans-serif" font-size="26" font-weight="700"
        text-anchor="middle" fill="#ffffff" letter-spacing="8" opacity="0.7">LOS SANTOS</text>
  <!-- Star badge -->
  <polygon points="256,458 263,472 279,472 267,481 272,496 256,487 240,496 245,481 233,472 249,472"
           fill="#ffd700" opacity="0.9"/>
</svg>